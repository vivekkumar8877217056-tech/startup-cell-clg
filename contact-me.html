<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contech me </title>
    <link rel="stylesheet" href="contact.css">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

</head>
<body>
<section class="contact-section">
  <div class="contact-container">
    <h2>Get In Touch</h2>
    <form action="#" class="contact-form">
      
      <div class="input-grid">
        <div class="input-group">
          <input type="text" placeholder="First Name" required>
        </div>
        <div class="input-group">
          <input type="text" placeholder="Last Name" required>
        </div>
        <div class="input-group">
          <input type="text" placeholder="Registration No." required>
        </div>
        <div class="input-group">
          <input type="text" placeholder="College Name" required>
        </div>
        <div class="input-group">
          <input type="text" placeholder="Branch" required>
        </div>
        <div class="input-group">
          <input type="number" placeholder="Year (e.g. 2026)" required>
        </div>
      </div>

      <div class="input-group full-width">
        <select required>
          <option value="" disabled selected>Select Semester</option>
          <option value="1">Semester 1</option>
          <option value="2">Semester 2</option>
          <option value="3">Semester 3</option>
          <option value="4">Semester 4</option>
          <option value="5">Semester 5</option>
          <option value="6">Semester 6</option>
          <option value="7">Semester 7</option>
          <option value="8">Semester 8</option>
        </select>
      </div>

      <div class="input-group full-width">
        <textarea rows="4" placeholder="How can I help you?"></textarea>
      </div>

      <button type="submit" class="submit-btn">Send Message</button>
    </form>
  </div>
</section>
    
</body>
</html>
